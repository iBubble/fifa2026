version: '3.8'

services:
  fifa2026:
    container_name: FIFA2026
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "20260:20260"
    environment:
      - PORT=20260
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3:8b
      - OLLAMA_PREDICT_TIMEOUT=20
      - OLLAMA_REVIEW_TIMEOUT=60
    volumes:
      - ./data:/app/data
      - ./src/frontend:/app/src/frontend
    restart: always
