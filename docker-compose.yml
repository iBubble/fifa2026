version: '3.8'

services:
  fifa2026:
    container_name: FIFA2026
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "20260:20260"
    environment:
      - PORT=20260
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3.6:35b-q4
      - OLLAMA_PREDICT_TIMEOUT=120
      - OLLAMA_REVIEW_TIMEOUT=180
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1,host.docker.internal
    volumes:
      - ./data:/app/data
      - ./src/frontend:/app/src/frontend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
