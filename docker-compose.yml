version: '3.8'

services:
  fifa2026:
    container_name: FIFA2026
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "20260:20260"
    environment:
      - PORT=20260
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3.6:35b-q4
      - OLLAMA_PREDICT_TIMEOUT=15
      - OLLAMA_REVIEW_TIMEOUT=60
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
